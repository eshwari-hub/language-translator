<!DOCTYPE html>
<html>
<head>
    <title>Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌐 Smart Translator</h1>
    <p class="subtitle">Translate text across global languages instantly</p>

    <textarea id="inputText" placeholder="Type your text here..."></textarea>

    <div class="controls">
        <select id="sourceLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="kn">Kannada</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh-CN">Chinese</option>
            <option value="ar">Arabic</option>
        </select>

        <button onclick="swapLang()">🔁</button>

        <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="kn">Kannada</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh-CN">Chinese</option>
            <option value="ar">Arabic</option>
        </select>
    </div>

    <button class="translate-btn" onclick="translateText()">Translate</button>

    <div class="output-box">
        <p id="outputText">Your translation will appear here...</p>
    </div>

    <div class="actions">
        <button onclick="copyText()">📋 Copy</button>
        <button onclick="speakText()">🔊 Speak</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
